<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Siriwan | Portfolio</title>

  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/index.css">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <script src="assets/js/app.js" defer></script>
</head>

<body class="theme-1" data-page="home" id="top">

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand-group" href="index.html">
        <img src="assets\images\pisces-sign.png" alt="Logo" class="brand-logo">
        <span class="brand-text">My Personal Website.</span>
      </a>

      <button class="menu-toggle" id="menu-toggle">
        <i class="fa-solid fa-bars"></i>
      </button>

      <nav class="nav" id="main-nav">
        <a class="nav-link nav-item is-active" href="index.html">Home</a>
        <a class="nav-link nav-item" href="projects.html">Projects</a>
        <a class="nav-link nav-item" href="cv.html">About me</a>
        <a class="nav-link nav-item" href="contact.html">Contact</a>
        <a class="nav-link nav-item" href="gallery.html">Gallery</a>
      </nav>
    </div>
  </header>

  <script>
  const menuToggle = document.getElementById('menu-toggle');
  const mainNav = document.getElementById('main-nav');

  menuToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    mainNav.classList.toggle('active');
    
    // สลับไอคอนระหว่างขีดกับกากบาท
    const icon = menuToggle.querySelector('i');
    icon.classList.toggle('fa-bars');
    icon.classList.toggle('fa-xmark');
  });

  // คลิกที่อื่นเพื่อปิดเมนูอัตโนมัติ
  document.addEventListener('click', () => {
    mainNav.classList.remove('active');
    const icon = menuToggle.querySelector('i');
    if(icon) {
      icon.classList.add('fa-bars');
      icon.classList.remove('fa-xmark');
    }
  });
</script>

  <main id="content">
    <section class="hero-section">
      <div class="static-bg"></div>

      <div class="hero-glass-container">
        
        <div class="hero-content">
          <div class="reveal-wrapper">
          </div>
          
          <div class="reveal-wrapper">
            <h1 class="hero-title">
              Hello, I'm <br>
              <span class="grad-text">Siriwan Phuttharasu</span>
            </h1>
          </div>

          <div class="reveal-wrapper">
            <p class="hero-subtitle">
            Welcome to my personal website project for the course 03376809 Web Technology.<br>
            This project showcases my work and learning in HTML, CSS, and JavaScript.
            </p>
          </div>

          <div class="hero-actions">
            <div class="social-row">
              <a href="contact.html" class="social-btn"><i class="fa-brands fa-facebook-f"></i></a>
              <a href="contact.html" class="social-btn"><i class="fa-solid fa-envelope"></i></a>
              <a href="contact.html" class="social-btn"><i class="fa-brands fa-instagram"></i></a>
            </div>
          </div>
        </div>

        <div class="hero-media">
          <div class="image-stack">
            <img src="assets\images\59EAC357-EA82-464A-8E9E-54AF8A7E2A20.jpg" alt="Siriwan" class="hero-img-static">
        </div>

      </div>
    </section>
  </main>

</body>
</html>
