<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projects | Siriwan Portfolio</title>

  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/css/projects.css" />
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <script src="assets/js/app.js" defer></script>
  <script src="assets/js/game.js" defer></script>
</head>

<body class="theme-2" data-page="projects" id="top">

  <div class="static-bg"></div>

  <header class="site-header">
  <div class="container header-inner">
    <a class="brand-group" href="index.html">
      <img src="assets/images/pisces-sign.png" alt="Logo" class="brand-logo">
      <span class="brand-text">My Personal Website.</span>
    </a>

    <button class="menu-toggle" id="menu-toggle">
      <i class="fa-solid fa-bars"></i>
    </button>

    <nav class="nav" id="main-nav">
      <a class="nav-link nav-item" href="index.html">Home</a>
      <a class="nav-link nav-item is-active" href="projects.html">Projects</a>
      <a class="nav-link nav-item" href="cv.html">About me</a>
      <a class="nav-link nav-item" href="contact.html">Contact</a>
      <a class="nav-link nav-item" href="gallery.html">Gallery</a>
    </nav>
  </div>
</header>

  <main id="content">
    <section class="hero-section">
      <div class="hero-glass-container" style="display: block; padding: 40px;">
        
        <div class="project-header" style="text-align: center; margin-bottom: 40px;">
          <h1 class="hero-title" style="opacity: 1; transform: none; font-size: clamp(2.5rem, 5vw, 3.5rem); margin-bottom: 10px;">
            My <span class="grad-text">Projects</span>
          </h1>
        </div>

        <div class="ttt-wrap">
          <div class="ttt-left">
            <h2 style="margin-bottom: 15px; color: var(--text-dark);">Tic Tac Toe Game</h2>
            <div class="ttt-status" id="tttStatus">Turn: X</div>

             <div id="tttModeText" style="text-align:center; margin-bottom:10px; font-weight:700; color:var(--text-dark);">
              Mode: Player vs Player
            </div>

            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
            <button id="modePVP" class="social-btn" style="width:auto; padding:8px 20px; border-radius:20px;">
              👥 PVP
            </button>

            <button id="modeCPU" class="social-btn" style="width:auto; padding:8px 20px; border-radius:20px;">
              🤖 AI
            </button>
          </div>

            <div class="ttt-board" id="tttBoard">
              <button class="ttt-cell" type="button"></button>
              <button class="ttt-cell" type="button"></button>
              <button class="ttt-cell" type="button"></button>
              <button class="ttt-cell" type="button"></button>
              <button class="ttt-cell" type="button"></button>
              <button class="ttt-cell" type="button"></button>
              <button class="ttt-cell" type="button"></button>
              <button class="ttt-cell" type="button"></button>
              <button class="ttt-cell" type="button"></button>
            </div>

            <div class="btn-row" style="margin-top: 25px; display: flex; gap: 10px; justify-content: center;">
              <button class="social-btn" id="tttRestart" style="width: auto; padding: 0 25px; border-radius: 50px; font-weight: 600;">Restart</button>
              <button class="social-btn" id="tttResetScore" style="width: auto; padding: 0 25px; border-radius: 50px; font-weight: 600; background: rgba(255,255,255,0.5);">Reset Score</button>
            </div>
          </div>

          <aside class="ttt-right">
            <div class="ttt-panel" style="background: rgba(255,255,255,0.4); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.6);">
              <h3 class="ttt-panel-title">Scoreboard</h3>
              <div class="ttt-score">
                <div class="ttt-score-item">
                  <span class="ttt-badge x">X</span>
                  <div>
                    <div class="ttt-label">Player X</div>
                    <div class="ttt-num" id="tttScoreX">0</div>
                  </div>
                </div>
                <div class="ttt-score-item">
                  <span class="ttt-badge o">O</span>
                  <div>
                    <div class="ttt-label">Player O</div>
                    <div class="ttt-num" id="tttScoreO">0</div>
                  </div>
                </div>
                <div class="ttt-score-item">
                  <span class="ttt-badge d">=</span>
                  <div>
                    <div class="ttt-label">Draw</div>
                    <div class="ttt-num" id="tttScoreD">0</div>
                  </div>
                </div>
              </div>

              <div class="ttt-winner" id="tttWinner" style="margin-top: 20px;">
                <div class="ttt-winner-title">Winner</div>
                <div class="ttt-winner-box">
                  <span id="tttWinnerText">—</span>
                </div>
                <div class="ttt-hint" id="tttHint">Make 3 in a row to win!</div>
              </div>
            </div>
          </aside>
        </div>

      </div>
    </section>
  </main>

  <script>
function openGame(game) {

  const xo = document.getElementById("xoGame");
  const mole = document.getElementById("moleGame");

  xo.style.display = "none";
  mole.style.display = "none";

  if (game === "xo") {
    xo.style.display = "block";

    // 🔥 รีเซ็ตเกมทุกครั้ง
    if (typeof restartGame === "function") {
      restartGame();
    }

  } else {
    mole.style.display = "block";
  }
}
</script>

<script>
  const toggle = document.querySelector('.menu-toggle');
  const nav = document.querySelector('.nav');

  toggle.addEventListener('click', () => {
    nav.classList.toggle('active');
  });
</script>
</body>
</html>
