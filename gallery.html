<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gallery | Siriwan Portfolio</title>
  
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/index.css">
  <link rel="stylesheet" href="assets/css/gallery.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    body {
      background: linear-gradient(180deg, #f7f1c1 0%, #ffcada 50%, #fbbfff 100%) !important;
      background-attachment: fixed;
      margin: 0;
    }

    .gallery-grid {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important; 
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 992px) {
      .gallery-grid {
        grid-template-columns: 1fr !important;
      }
    }

    .china-card {
      background: rgba(255, 255, 255, 0.4) !important; 
      border-radius: 25px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
    }

    .china-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.1);
      background: rgba(255, 255, 255, 0.7) !important;
    }

    .card-image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 4px;
      padding: 4px;
      height: 280px;
    }

    .grid-thumb {
      background-size: cover;
      background-position: center;
      background-color: #f0f0f0;
      border-radius: 15px;
      transition: transform 0.3s ease, filter 0.3s ease;
      cursor: pointer; /* เพิ่มเพื่อให้รู้ว่ากดได้ */
    }

    .grid-thumb:hover {
      transform: scale(1.02);
      filter: brightness(0.9);
    }
    
    .grad-text {
      background: linear-gradient(90deg, #e63946, #f4a261);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* --- Lightbox Styles --- */
    .lightbox-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
      cursor: zoom-out;
    }

    .lightbox-overlay.active {
      display: flex;
    }

    .lightbox-img {
      max-width: 90%;
      max-height: 85vh;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      transform: scale(0.8);
      transition: transform 0.3s ease-out;
    }

    .lightbox-overlay.active .lightbox-img {
      transform: scale(1);
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 35px;
      cursor: pointer;
    }
  </style>

  <script src="assets/js/app.js" defer></script>
</head>

<body class="theme-4" data-page="gallery" id="top">

  <div class="lightbox-overlay" id="lightbox">
    <span class="close-btn">&times;</span>
    <img src="" alt="Full View" class="lightbox-img" id="lightbox-img">
  </div>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand-group" href="index.html">
        <img src="assets/images/pisces-sign.png" alt="Logo" class="brand-logo">
        <span class="brand-text">My Personal Website.</span>
      </a>

      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
        <i class="fa-solid fa-bars"></i>
      </button>

      <nav class="nav" id="main-nav">
        <a class="nav-link nav-item" href="index.html">Home</a>
        <a class="nav-link nav-item" href="projects.html">Projects</a>
        <a class="nav-link nav-item" href="cv.html">About me</a>
        <a class="nav-link nav-item" href="contact.html">Contact</a>
        <a class="nav-link nav-item is-active" href="gallery.html">Gallery</a>
      </nav>
    </div>
  </header>

  <main id="content">
    <section class="hero-section">
      <div class="hero-glass-container" style="display: block; padding: 50px 20px;">
        
        <div class="gallery-header" style="text-align: center; margin-bottom: 50px;">
          <h1 class="hero-title" style="font-size: clamp(2.5rem, 6vw, 4rem); margin-bottom: 15px; font-weight: 800;">
            My <span class="grad-text">Journey</span>
          </h1>
          <p class="hero-subtitle" style="margin: 0 auto; max-width: 600px; line-height: 1.6; color: var(--text-muted);">
            Experiences from Internship in China 2025 <br>
          </p>
        </div>

        <div class="gallery-grid">
          
          <div class="gallery-card china-card">
            <div class="card-image-grid">
              <div class="grid-thumb" style="background-image: url('assets/images/t1.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/t2.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/t3.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/t4.jpg');"></div>
            </div>
            <div class="gallery-info" style="padding: 24px; flex-grow: 1;">
              <h3 style="color: #333;">Workspace & Team</h3>
            </div>
          </div>

          <div class="gallery-card china-card">
            <div class="card-image-grid">
              <div class="grid-thumb" style="background-image: url('assets/images/f1.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/f2.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/f3.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/f4.jpg');"></div>
            </div>
            <div class="gallery-info" style="padding: 24px; flex-grow: 1;">
              <h3 style="color: #333;">Chinese Cuisine</h3>
            </div>
          </div>

          <div class="gallery-card china-card">
            <div class="card-image-grid">
              <div class="grid-thumb" style="background-image: url('assets/images/l1.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/l2.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/l3.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/l4.jpg');"></div>
            </div>
            <div class="gallery-info" style="padding: 24px; flex-grow: 1;">
              <h3 style="color: #333;">Landmarks</h3>
            </div>
          </div>

          <div class="gallery-card china-card">
            <div class="card-image-grid">
              <div class="grid-thumb" style="background-image: url('assets/images/d1.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/d2.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/d3.jpg');"></div>
              <div class="grid-thumb" style="background-image: url('assets/images/d4.jpg');"></div>
            </div>
            <div class="gallery-info" style="padding: 24px; flex-grow: 1;">
              <h3 style="color: #333;">Daily Life</h3>
            </div>
          </div>

        </div> 
      </div> 
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Menu Toggle Logic
      const menuToggle = document.getElementById('menu-toggle');
      const mainNav = document.getElementById('main-nav');

      if (menuToggle && mainNav) {
        menuToggle.addEventListener('click', (e) => {
          e.stopPropagation();
          mainNav.classList.toggle('active');
          const icon = menuToggle.querySelector('i');
          if (icon) {
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
          }
        });
      }

      // 2. Lightbox Logic (คลิกรูปเพื่อขยาย)
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const thumbs = document.querySelectorAll('.grid-thumb');

      thumbs.forEach(thumb => {
        thumb.addEventListener('click', () => {
          const bgImg = getComputedStyle(thumb).backgroundImage;
          const url = bgImg.slice(5, -2); // ตัดเอาเฉพาะ path รูปภาพ
          
          lightboxImg.src = url;
          lightbox.classList.add('active');
          document.body.style.overflow = 'hidden'; // ล็อคการสกรูลหน้าจอ
        });
      });

      // ปิด Lightbox เมื่อคลิกพื้นหลังหรือปุ่มปิด
      lightbox.addEventListener('click', () => {
        lightbox.classList.remove('active');
        document.body.style.overflow = 'auto'; // คืนค่าการสกรูลหน้าจอ
      });
    });
  </script>

</body>
</html>
